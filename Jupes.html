    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #e74c3c;
            --light-gray: #f5f5f5;
            --dark-gray: #333;
            --white: #fff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--light-gray);
            color: var(--dark-gray);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* Header */
        .page-header {
            margin-bottom: 40px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        
        .breadcrumb {
            font-size: 14px;
            color: #777;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .breadcrumb a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }
        
        .breadcrumb .separator {
            color: #999;
        }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }
        
        .product-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .product-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-category {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark-gray);
        }
        
        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 15px;
        }
        
        .add-to-cart {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            text-transform: uppercase;
        }
        
        .add-to-cart:hover {
            background-color: var(--secondary-color);
        }
    </style>
</head>

    <script>

         function goToCommande(nom, prix, image) {
    const url = new URL('commande.html', window.location.origin);
    url.searchParams.set('nom', nom);
    url.searchParams.set('prix', prix);
    url.searchParams.set('image', image);
    window.location.href = url.toString();
  }


         function mettreAJourCompteurPanier() {
    const panier = JSON.parse(localStorage.getItem("panier")) || [];
    const totalQuantite = panier.reduce((total, item) => total + item.quantite, 0);
    document.getElementById("cartCount").textContent = totalQuantite;
  }

  // Met à jour dès le chargement de la page
  window.addEventListener("load", mettreAJourCompteurPanier);

        document.addEventListener('DOMContentLoaded', function() {
            // Gestion du panier
            document.querySelectorAll('.add-to-cart').forEach(button => {
                button.addEventListener('click', function() {
                    const productCard = this.closest('.product-card');
                    const productName = productCard.querySelector('.product-name').textContent;
                    const productPrice = productCard.querySelector('.product-price').textContent;
                    
                    // Animation de feedback
                    this.textContent = 'Ajouté !';
                    this.style.backgroundColor = '#27ae60';
                    
                    setTimeout(() => {
                        this.textContent = 'Acheter';
                        this.style.backgroundColor = '';
                    }, 2000);
                    
                    // Ici vous pourriez ajouter la logique d'ajout au panier
                    console.log(`Ajout au panier: ${productName} - ${productPrice}`);
                });
            });
            
            // Vous pourriez ajouter ici:
            // - Un filtre par catégorie
            // - Un tri par prix

        });
