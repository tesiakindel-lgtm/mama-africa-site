    /* Header principal */

    .search-bar {

      max-width: 500px;
      padding: 10px 16px;
      border: 2px solid #276243;
      border-radius: 30px;

    }
    .search-bar:focus {

      box-shadow: 0 0 6px #1d3b29aa;
    }

    .icons {
      display: flex;
      gap: 20px;
      font-weight: 600;
      align-items: center;
      color: #276243;
    }
    .icons a.nav-item {
      text-decoration: none;
      color: #276243;
      font-weight: 600;
      transition: color 0.3s ease;
      position: relative;
    }
    .icons a.nav-item:hover {
      color: #1d3b29;
    }

    /* Nav menu */
    .nav-menu {
      background-color: #276243;
      display: flex;
      align-items: center;
      padding: 10px 20px;
      gap: 20px;
      font-weight: 600;
      color: white;
      user-select: none;
      font-size: 16px;
    }
    .nav-item {
      color: white;
      text-decoration: none;
      position: relative;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }
    .nav-item:hover,
    .nav-item:focus {
      background-color: #1d3b29;
      outline: none;
    }

    /* Separator vertical */
    .separator {
      color: #99b999;
      user-select: none;
    }

    /* Dropdown menu */
    .dropdown {
      position: relative;
    }

    .dropdown-title {
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    .dropdown-toggle {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      padding: 0;
      line-height: 1;
      transition: transform 0.3s ease;
    }
    .dropdown-toggle[aria-expanded="true"] {
      transform: rotate(180deg);
    }

    .dropdown-content {
      position: absolute;
      top: 100%;
      left: 0;
      background-color: white;
      min-width: 180px;
      border-radius: 6px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      display: none;
      flex-direction: column;
      z-index: 1000;
    }
    .dropdown-content a {
      color: #276243;
      padding: 10px 16px;
      text-decoration: none;
      font-weight: 500;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }
    .dropdown-content a:hover,
    .dropdown-content a:focus {
      background-color: #d7eadf;
      outline: none;
    }
    .dropdown.active .dropdown-content {
      display: flex;
    }
  </style>
</head>

  <script>
    // Gestion du menu déroulant Vêtements au clic sur la flèche
    // Gestion du menu déroulant Vêtements au clic sur la flèche
document.addEventListener('DOMContentLoaded', () => {
  const dropdown = document.querySelector('.nav-item.dropdown');
  const toggleBtn = dropdown.querySelector('.dropdown-toggle');
  const dropdownContent = dropdown.querySelector('.dropdown-content');

  toggleBtn.addEventListener('click', (e) => {
    e.preventDefault();
    const expanded = toggleBtn.getAttribute('aria-expanded') === 'true';
    toggleBtn.setAttribute('aria-expanded', !expanded);
    dropdown.classList.toggle('active');
  });

  // Optionnel : fermer le menu si on clique ailleurs
  document.addEventListener('click', (e) => {
    if (!dropdown.contains(e.target)) {
      toggleBtn.setAttribute('aria-expanded', 'false');
      dropdown.classList.remove('active');
    }
  });
});
</script>
