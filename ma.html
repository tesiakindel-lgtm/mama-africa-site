<style>
  .instagram-promo {
    position: relative;
    height: 500px;
    overflow: hidden;
  }
  
  .rotating-images {
    position: absolute;
    width: 100%;
    height: 100%;
    animation: rotate 30s infinite linear;
  }
  
  .rotating-images img {
    position: absolute;
    width: 150px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    /* Positionnement circulaire */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(0deg) translateX(200px) rotate(0deg);
  }
  
  .text-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    background: rgba(255,255,255,0.8);
    padding: 20px;
    border-radius: 10px;
  }
  
  @keyframes rotate {
    100% { transform: rotate(360deg); }
  }
</style>

<script>
  // Script pour positionner les images en cercle
  document.addEventListener('DOMContentLoaded', function() {
    const images = document.querySelectorAll('.rotating-images img');
    const angle = 360 / images.length;
    
    images.forEach((img, i) => {
      const rotate = angle * i;
      img.style.transform = `translate(-50%, -50%) rotate(${rotate}deg) translateX(200px) rotate(-${rotate}deg)`;
    });
  });
</script>
