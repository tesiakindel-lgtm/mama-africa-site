<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commande Produit</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    .product-img {
      width: 100%;
      max-width: 300px;
    }
    .hidden {
      display: none;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 5px;
      margin-top: 5px;
    }
    .button-row {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>

  <h2>Détails du Produit</h2>
  <img id="productImage" class="product-img" src="" alt="Image produit">
  <p><strong>Nom :</strong> <span id="productName">Produit Inconnu</span></p>
  <p><strong>Prix unitaire :</strong> <span id="productPrice">0</span> TND</p>

  <label for="quantity">Quantité :</label>
  <input type="number" id="quantity" value="1" min="1">

  <h3>Informations de Commande</h3>
  <form id="orderForm">
    <label>Nom :</label>
    <input type="text" id="nom" required>

    <label>Prénom :</label>
    <input type="text" id="prenom" required>

    <label>Téléphone :</label>
    <input type="tel" id="telephone" required>

    <label>Type de paiement :</label>
    <select id="paiement">
      <option value="livraison">Paiement à la livraison</option>
      <option value="carte">Carte bancaire</option>
    </select>

    <div id="carteSection" class="hidden">
      <label>Numéro de carte :</label>
      <input type="text" placeholder="**** **** **** ****" maxlength="19">
      <label>Nom sur la carte :</label>
      <input type="text">
      <label>Date d’expiration :</label>
      <input type="month">
      <label>Code de sécurité :</label>
      <input type="text" maxlength="4">
    </div>

    <h3>Résumé</h3>
    <p>Sous-total : <span id="sousTotal">0</span> TND</p>
    <p>Livraison : <span id="livraison">4</span> TND</p>
    <p>Total TTC : <strong><span id="total">0</span></strong> TND</p>

    <div class="button-row">
      <button type="button" onclick="confirmerCommande()">✅ Confirmer</button>
      <button type="button" onclick="ajouterAuPanier()">🛒 Ajouter au panier</button>
      <button type="button" onclick="window.location.href='index.html'">❌ Annuler</button>
    </div>
  </form>

  <script>
    // Récupération des données via URL
    const params = new URLSearchParams(window.location.search);
    const nom = params.get("nom");
    const prix = parseFloat(params.get("prix"));
    const image = params.get("image");

    // DOM elements
    const productImage = document.getElementById("productImage");
    const productName = document.getElementById("productName");
    const productPrice = document.getElementById("productPrice");
    const quantityInput = document.getElementById("quantity");
    const sousTotal = document.getElementById("sousTotal");
    const livraison = document.getElementById("livraison");
    const total = document.getElementById("total");
    const paiement = document.getElementById("paiement");
    const carteSection = document.getElementById("carteSection");

    if (nom && prix && image) {
      productImage.src = image;
      productName.textContent = nom;
      productPrice.textContent = prix.toFixed(2);
      updateTotal();
    }

    quantityInput.addEventListener("input", updateTotal);
    paiement.addEventListener("change", () => {
      carteSection.classList.toggle("hidden", paiement.value !== "carte");
    });

    function updateTotal() {
      const qty = parseInt(quantityInput.value);
      const sous = prix * qty;
      let liv = sous >= 100 ? 0 : 4;
      sousTotal.textContent = sous.toFixed(2);
      livraison.textContent = liv === 0 ? "Gratuit" : liv.toFixed(2);
      total.textContent = (sous + liv).toFixed(2);
    }

    function confirmerCommande() {
      const nomClient = document.getElementById("nom").value.trim();
      const prenom = document.getElementById("prenom").value.trim();
      const tel = document.getElementById("telephone").value.trim();

      if (!nomClient || !prenom || !tel) {
        alert("Veuillez remplir tous les champs obligatoires.");
        return;
      }

      alert("✅ Votre achat a été confirmé !");
      window.location.href = "index.html";
    }

    function ajouterAuPanier() {
      const qty = parseInt(quantityInput.value);
      const produit = {
        nom: nom,
        prix: prix,
        image: image,
        quantite: qty
      };

      let panier = JSON.parse(localStorage.getItem("panier")) || [];
      panier.push(produit);
      localStorage.setItem("panier", JSON.stringify(panier));

      alert("🛒 Produit ajouté au panier !");
    }












    
  function mettreAJourCompteurPanier() {
    const panier = JSON.parse(localStorage.getItem("panier")) || [];
    const totalQuantite = panier.reduce((total, item) => total + item.quantite, 0);
    document.getElementById("cartCount").textContent = totalQuantite;
  }

  // Met à jour dès le chargement de la page
  window.addEventListener("load", mettreAJourCompteurPanier);


    
  </script>

</body>
</html>
