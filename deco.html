<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Section Highlights</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f8f8;
      margin: 0;
      padding: 20px;
    }

    .highlight-section {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px auto;
      max-width: 1200px;
      flex-wrap: wrap;
      padding: 0 20px;
    }

    .highlight-box {
      flex: 1;
      min-width: 250px;
      background-color: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .highlight-box:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .highlight-box img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .highlight-box:hover img {
      transform: scale(1.05);
    }

    .highlight-box h3 {
      font-size: 20px;
      margin: 15px 0 10px;
      color: #2c3e50;
    }

    .highlight-box a {
      text-decoration: none;
      color: inherit;
    }

    .carousel {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
    }

    .carousel img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: none;
    }

    .carousel img.active {
      display: block;
    }

    .carousel .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 25px;
      color: white;
      background-color: rgba(0,0,0,0.4);
      padding: 10px;
      cursor: pointer;
      z-index: 1;
      border-radius: 50%;
      user-select: none;
    }

    .carousel .arrow.left {
      left: 10px;
    }

    .carousel .arrow.right {
      right: 10px;
    }

    .shop-now-button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #e67e22;
      color: #fff;
      padding: 10px 20px;
      border: none;
      font-weight: bold;
      border-radius: 25px;
      text-decoration: none;
      font-family: 'Arial', sans-serif;
      transition: background-color 0.3s ease;
      z-index: 2;
    }

    .shop-now-button:hover {
      background-color: #cf711b;
    }
  </style>
</head>
<body>

  <section class="highlight-section">
    <!-- Nos promotions -->
    <div class="highlight-box">
      <a href="promotions.html">
        <img src="images/promo.jpg" alt="Nos promotions">
        <h3>Nos Promotions</h3>
      </a>
    </div>

    <!-- Nos meilleures ventes avec carrousel -->
    <div class="highlight-box">
      <h3>Nos Meilleures Ventes</h3>
      <div class="carousel">
        <span class="arrow left" onclick="prevImage()">&#10094;</span>
        <span class="arrow right" onclick="nextImage()">&#10095;</span>
        <img src="images/best1.jpg" class="active" alt="Vente 1">
        <img src="images/best2.jpg" alt="Vente 2">
        <img src="images/best3.jpg" alt="Vente 3">
      </div>
      <a href="shop-now.html" class="shop-now-button">Shop Now</a>
    </div>

    <!-- Nos nouveautés -->
    <div class="highlight-box">
      <a href="nouveautes.html">
        <img src="images/nouveautes.jpg" alt="Nos nouveautés">
        <h3>Nos Nouveautés</h3>
      </a>
    </div>
  </section>

  <script>
    let currentImage = 0;
    const images = document.querySelectorAll('.carousel img');

    function showImage(index) {
      images.forEach((img, i) => {
        img.classList.toggle('active', i === index);
      });
    }

    function nextImage() {
      currentImage = (currentImage + 1) % images.length;
      showImage(currentImage);
    }

    function prevImage() {
      currentImage = (currentImage - 1 + images.length) % images.length;
      showImage(currentImage);
    }
  </script>

</body>
</html>
