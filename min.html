<style>
  /* Style minimaliste pour intégration facile */
  .instagram-slider-container {
    position: relative;
    max-width: 100%;
    margin: 0 auto;
    overflow: hidden;
    border-radius: 12px;
  }
  
  .instagram-slider {
    display: flex;
    transition: transform 1.2s ease-in-out;
    height: 400px; /* Ajustez selon vos besoins */
  }
  
  .instagram-slider .slide {
    min-width: 100%;
    position: relative;
  }
  
  .instagram-slider img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  
  .instagram-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    width: 90%;
    max-width: 500px;
    z-index: 2;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    padding: 20px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
  }
  
  .instagram-overlay h2 {
    font-size: 1.8em;
    margin-bottom: 10px;
  }
  
  .instagram-overlay p {
    margin-bottom: 15px;
    line-height: 1.4;
  }
  
  .instagram-handle {
    font-weight: bold;
    font-size: 1.4em;
    color: #fff;
    display: inline-block;
    padding: 5px 15px;
    background: linear-gradient(45deg, #405DE6, #833AB4, #C13584, #E1306C, #FD1D1D);
    border-radius: 20px;
  }
  
  @media (max-width: 768px) {
    .instagram-slider {
      height: 300px;
    }
    
    .instagram-overlay {
      padding: 15px;
    }
    
    .instagram-overlay h2 {
      font-size: 1.4em;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const slider = document.querySelector('.instagram-slider');
    const slides = document.querySelectorAll('.slide');
    let currentIndex = 0;
    const slideCount = slides.length;
    
    function nextSlide() {
      currentIndex = (currentIndex + 1) % slideCount;
      updateSlider();
    }
    
    function updateSlider() {
      slider.style.transform = `translateX(-${currentIndex * 100}%)`;
    }
    
    // Démarrer l'animation
    const interval = setInterval(nextSlide, 500); // 5 secondes
    
    // Pause au survol
    const container = document.querySelector('.instagram-slider-container');
    container.addEventListener('mouseenter', () => clearInterval(interval));
    container.addEventListener('mouseleave', () => {
      interval = setInterval(nextSlide, 5000);
    });
  });
</script>
