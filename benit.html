<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Réseaux Sociaux</title>
  <style>
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .social-icons a {
      display: inline-block;
    }

    .social-icons img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .social-icons img:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>

  <div class="social-icons">
    <a href="https://www.facebook.com/kendall.kind" target="_blank">
      <img src="facebook.jpg" alt="Facebook">
    </a>
    <a href="https://wa.me/21651467979" target="_blank">
      <img src="whatsapp.jpg" alt="WhatsApp">
    </a>
    <a href="https://www.tiktok.com/@tesi" target="_blank">
      <img src="tiktok.jpg" alt="TikTok">
    </a>
  </div>

</body>
</html>
